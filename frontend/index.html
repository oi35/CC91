<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <h1 id="formTitle">Login</h1>

        <!-- 登录表单 -->
        <form id="loginForm">
            <div class="form-group">
                <label for="loginUsername">Username</label>
                <input type="text" id="loginUsername" name="username" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" name="password" required>
            </div>
            <button type="submit" id="loginBtn">Login</button>
        </form>

        <!-- 注册表单 -->
        <form id="registerForm">
            <div class="form-group">
                <label for="regUsername">Username</label>
                <input type="text" id="regUsername" name="username" required>
            </div>
            <div class="form-group">
                <label for="regEmail">Email</label>
                <input type="email" id="regEmail" name="email" required>
            </div>
            <div class="form-group">
                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" name="password" required>
            </div>
            <button type="submit" id="registerBtn">Register</button>
        </form>

        <!-- 邮箱验证表单 -->
        <form id="verifyForm">
            <p class="verification-info">
                A verification code has been sent to<br>
                <strong id="verifyEmailDisplay"></strong>
            </p>
            <div class="form-group">
                <label for="verificationCode">Verification Code</label>
                <input type="text" id="verificationCode" name="code" required maxlength="6" placeholder="Enter 6-digit code">
            </div>
            <button type="submit" id="verifyBtn">Verify</button>
        </form>

        <div id="message" class="message"></div>

        <div class="form-footer" id="formFooter">
            <span id="footerText">Don't have an account? <a id="toggleToRegister">Register</a></span>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
